<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Pentru femeia mea perfectă 💖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #ffedf0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            color: #fff;
        }

        h1 {
            font-size: 50px;
            text-align: center;
            color: #ff007f;
            text-shadow: 2px 2px 10px #ffb3d9;
            animation: sparkle 2s infinite alternate;
        }

        @keyframes sparkle {
            0% {
                text-shadow: 2px 2px 10px #ffb3d9;
                transform: scale(1);
            }

            100% {
                text-shadow: 2px 2px 20px #ff66b3;
                transform: scale(1.05);
            }
        }

        p {
            font-size: 28px;
            margin-top: 20px;
            text-align: center;
            color: #ff3366;
        }

        button {
            font-size: 24px;
            padding: 15px 30px;
            border-radius: 15px;
            border: none;
            background: #ff66b3;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255,0,127,0.4);
            transition: all 0.3s ease;
        }

            button:hover {
                background: #ff3385;
                transform: scale(1.1);
            }

        /* Fundal animat cu inimioare și pupici */
        .emoji {
            position: absolute;
            font-size: 24px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-50px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Stil pentru minijoc WOW-style litere */
        #gameArea {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #question {
            font-size: 24px;
            margin-bottom: 15px;
            color: #ff3366;
            text-align: center;
        }

        #letters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .letter {
            width: 50px;
            height: 50px;
            background: #ff66b3;
            margin: 5px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
        }

        #answerBox {
            display: flex;
            justify-content: center;
            border: 2px dashed #ff007f;
            padding: 10px;
            min-width: 250px;
            min-height: 60px;
            border-radius: 10px;
            flex-wrap: wrap;
        }

        #feedback {
            font-size: 28px;
            margin-top: 20px;
            color: #ff0055;
            display: none;
            text-align: center;
            animation: pop 0.5s;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1);
            }
        }

        button#nextQ {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            background: #ff66b3;
            border: none;
            color: white;
        }

            button#nextQ:hover {
                background: #ff3385;
            }
    </style>
</head>
<body>

    <h1>💖 Pentru femeia mea perfectă 💖</h1>
    <p>Apasă pe surpriză, bebe! 🥰</p>

    <!-- Butoanele puzzle -->
    <button onclick="window.open('https://www.jigsawplanet.com/?rc=play&pid=076611af9fa7','_blank')">🎁 Puzzle-ul nostru </button>
    <button onclick="window.open('https://www.jigsawplanet.com/?rc=play&pid=22e822c51a82','_blank')">🎉 Încearcă încă un puzzle aici</button>
    <button onclick="window.open('https://www.jigsawplanet.com/?rc=play&pid=14e3fde946da','_blank')">🌟 Puzzle-ul următor</button>

    <!-- Minijoc WOW-style litere -->
    <div id="gameArea">
        <div id="question">Întrebarea va apărea aici</div>
        <div id="letters"></div>
        <div id="answerBox"></div>
        <div id="feedback">Nu exista un raspuns mai corect decat sotia mea frumoasa! 😘</div>
        <button id="nextQ" style="display:none;">Următoarea întrebare</button>
    </div>

    <!-- Emoji-uri animate -->
    <span class="emoji" style="left:10%;">❤️</span>
    <span class="emoji" style="left:20%;">😘</span>
    <span class="emoji" style="left:30%;">💫</span>
    <span class="emoji" style="left:40%;">🌸</span>
    <span class="emoji" style="left:50%;">💖</span>
    <span class="emoji" style="left:60%;">💌</span>
    <span class="emoji" style="left:70%;">🥰</span>
    <span class="emoji" style="left:80%;">🌹</span>
    <span class="emoji" style="left:90%;">💕</span>

    <script>
        // --- Minijoc litere WOW-style ---
        const gameData = [
            { q: "Cine este cea mai importanta persoana din viata mea?", answer: "ARIANAPREDA" },
            { q: "Ce ne-a atras pe amândoi în prima zi când v-ați cunoscut?", answer: "HORROR" },
            { q: "Care este activitatea preferată a lui când merge în pădure?", answer: "PESCUITUL" },
            { q: "Care este culoarea preferată a iubitei tale?", answer: "TURQOAZ" },
            { q: "Unde i-ar plăcea să fie cu tine?", answer: "PLAJA" }
        ];

        let current = 0;
        const questionDiv = document.getElementById('question');
        const lettersDiv = document.getElementById('letters');
        const answerBox = document.getElementById('answerBox');
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('nextQ');

        function shuffle(str) {
            return str.split('').sort(() => 0.5 - Math.random()).join('');
        }

        function loadQuestion() {
            answerBox.innerHTML = '';
            lettersDiv.innerHTML = '';
            feedback.style.display = 'none';
            nextBtn.style.display = 'none';

            const q = gameData[current];
            questionDiv.textContent = q.q;
            const shuffled = shuffle(q.answer);
            for (let char of shuffled) {
                const span = document.createElement('div');
                span.textContent = char;
                span.className = 'letter';
                span.draggable = true;
                span.addEventListener('dragstart', dragStart);
                lettersDiv.appendChild(span);
            }
            answerBox.addEventListener('dragover', dragOver);
            answerBox.addEventListener('drop', drop);
        }

        function dragStart(e) {
            e.dataTransfer.setData('text', e.target.textContent);
            e.target.style.opacity = '0.5';
        }
        function dragOver(e) { e.preventDefault(); }

        function drop(e) {
            e.preventDefault();
            const char = e.dataTransfer.getData('text');
            const div = document.createElement('div');
            div.textContent = char;
            div.className = 'letter';
            answerBox.appendChild(div);

            const answer = Array.from(answerBox.children).map(c => c.textContent).join('');
            const correct = gameData[current].answer;

            if (answer === correct) {
                feedback.style.display = 'block';
                for (let i = 0; i < 10; i++) { createEmoji(); }
                nextBtn.style.display = 'block';
            } else if (answer.length >= correct.length) {
                // Dacă răspunsul are lungimea răspunsului și nu e corect => reset
                setTimeout(() => {
                    answerBox.innerHTML = '';
                }, 500);
            }
        }

        nextBtn.addEventListener('click', () => {
            current++;
            if (current >= gameData.length) current = 0;
            loadQuestion();
        });

        loadQuestion();

        // --- Emoji-uri animate ---
        function createEmoji() {
            const em = document.createElement('span');
            em.className = 'emoji';
            const emojis = ['❤️', '😘', '💖', '💌', '🌸'];
            em.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            em.style.left = Math.random() * 90 + 'vw';
            document.body.appendChild(em);
            setTimeout(() => document.body.removeChild(em), 4000);
        }

        nextBtn.addEventListener('click', () => {
            current++;
            if (current >= gameData.length) current = 0;
            loadQuestion();
        });

        loadQuestion();

        // --- Emoji-uri animate ---
        function createEmoji() {
            const em = document.createElement('span');
            em.className = 'emoji';
            const emojis = ['❤️', '😘', '💖', '💌', '🌸'];
            em.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            em.style.left = Math.random() * 90 + 'vw';
            document.body.appendChild(em);
            setTimeout(() => document.body.removeChild(em), 4000);
        }
    </script>

</body>
</html>
